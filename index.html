<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IIOU App</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f4f4f9; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
    button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; }
    #loginBtn { background: #007AFF; color: white; }
    #gameBtn { background: #5856D6; color: white; display: none; }
    #debugLog { background: #1C1C1E; color: #32D74B; padding: 10px; font-size: 10px; height: 100px; overflow-y: scroll; margin-top: 10px; border-radius: 10px; text-align: left; }
    .footer { margin-top: 20px; font-size: 0.8rem; }
  </style>
</head>
<body>

<div class="card">
  <h1>IIOU</h1>
  <div id="status">Status: Disconnesso</div>
  
  <!-- Il bottone login deve essere visibile inizialmente -->
  <button id="loginBtn">Login con Pi</button>
  
  <!-- Contenitore di gioco nascosto all'avvio -->
  <div id="gameSection" style="display:none;">
    <button id="gameBtn">Start Click Challenge (1 Pi)</button>
  </div>
  
  <div id="debugLog">Log:</div>
  <div class="footer"><a href="#">Privacy</a> | <a href="#">Terms</a></div>
</div>

<script>
  function log(m) { document.getElementById('debugLog').innerHTML += m + "<br>"; }
  Pi.init({ version: "2.0", sandbox: true });

  document.getElementById('loginBtn').onclick = async () => {
    try {
      const auth = await Pi.authenticate(["username", "payments"], (user) => {});
      window.piUser = auth.user;
      document.getElementById('status').innerText = "Loggato: " + window.piUser.username;
      
      // Mostriamo il gioco e nascondiamo il login dopo l'autenticazione
      document.getElementById('gameSection').style.display = "block";
      document.getElementById('gameBtn').style.display = "block";
      document.getElementById('loginBtn').style.display = "none";
      log("Login effettuato: " + window.piUser.username);
    } catch (e) { log("Errore: " + e.message); }
  };

  document.getElementById('gameBtn').onclick = async () => {
    log("Avvio sfida...");
    try {
      await Pi.createPayment({ amount: 1.0, memo: "Ticket Gara", metadata: { type: "game" } }, {
        onReadyForServerCompletion: async (pId, txid) => {
          log("Ticket pagato! Clicca il tasto!");
          let clicks = 0;
          const btn = document.getElementById('gameBtn');
          btn.innerText = "CLICCA VELOCE! (0)";
          
          const interval = setInterval(() => { clicks++; btn.innerText = "CLICCA! ("+clicks+")"; }, 500);
          setTimeout(async () => {
            clearInterval(interval);
            if(clicks >= 5) {
              log("Vittoria! Invio premio...");
              const res = await fetch("https://iiou.vercel.app/api/a2u", { 
                method: "POST", headers: {"Content-Type":"application/json"}, 
                body: JSON.stringify({ amount: 1.5, uid: window.piUser.uid })
              });
              log("Premio inviato!");
            } else {
              log("Troppo lento, riprova!");
            }
            btn.innerText = "Start Click Challenge (1 Pi)";
          }, 5000);
        },
        onError: (err) => log("Errore Pagamento: " + err.message)
      });
    } catch (e) { log("Errore Gara: " + e.message); }
  };
</script>
</body>
</html>
