<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IIOU - App</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f4f4f9; }
    .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
    button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; transition: transform 0.2s; }
    button:active { transform: scale(0.98); }
    #loginBtn { background: #5a6cff; color: white; }
    #u2aBtn { background: #f1c40f; color: black; }
    #a2uBtn { background: #2ecc71; color: white; }
    .footer { margin-top: 20px; font-size: 0.8rem; color: #777; }
  </style>
</head>
<body>

<div class="card">
  <h1>IIOU</h1>
  <div id="status">Status: Disconnesso</div>
  <button id="loginBtn">Login con Pi</button>
  
  <div id="paymentControls" style="display:none;">
    <button id="u2aBtn">USER TO APP</button>
    <button id="a2uBtn">APP TO USER</button>
  </div>
</div>

<div class="footer">
  <a href="/privacy">Privacy Policy</a> | <a href="/terms">Terms of Service</a>
</div>

<script>
  // Inizializzazione SDK
  Pi.init({ version: "2.0", sandbox: false });

  // LOGIN
  document.getElementById('loginBtn').onclick = async () => {
    try {
      const auth = await Pi.authenticate(["username", "payments"], (user) => {});
      document.getElementById('status').innerText = "Loggato: " + auth.user.username;
      document.getElementById('paymentControls').style.display = "block";
      document.getElementById('loginBtn').style.display = "none";
    } catch (e) { alert("Login fallito: " + e.message); }
  };

  // APP TO USER
  document.getElementById('a2uBtn').onclick = async () => {
    const res = await fetch("/api/a2u", { 
      method: "POST", 
      headers: {"Content-Type":"application/json"}, 
      body: JSON.stringify({ amount: 0.1 })
    });
    const data = await res.json();
    alert(data.success ? "Ricompensa inviata!" : "Errore: " + data.error);
  };

  // USER TO APP - Implementazione impeccabile con tutte le callback
  document.getElementById('u2aBtn').onclick = async () => {
    try {
      await Pi.createPayment({
        amount: 1.0,
        memo: "Pagamento IIOU",
        metadata: { type: "u2a" }
      }, {
        onReadyForServerApproval: (pId) => {
          fetch("/api/pi-payment", { 
            method: "POST", 
            headers: {"Content-Type":"application/json"}, 
            body: JSON.stringify({ action: "approve", paymentId: pId })
          });
        },
        onReadyForServerCompletion: (pId, txid) => {
          fetch("/api/pi-payment", { 
            method: "POST", 
            headers: {"Content-Type":"application/json"}, 
            body: JSON.stringify({ action: "complete", paymentId: pId, txid: txid })
          });
        },
        onCancel: (pId) => {
          console.log("Pagamento annullato dall'utente", pId);
        },
        onError: (err, pId) => {
          console.error("Errore SDK:", err);
          alert("Errore durante il pagamento: " + err.message);
        }
      });
    } catch (e) {
      alert("Errore critico: " + e.message);
    }
  };
</script>
</body>
</html>
