<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IIOU App</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f4f4f9; }
    .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
    button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; }
    #loginBtn { background: #5a6cff; color: white; }
    #u2aBtn { background: #f1c40f; color: black; }
    #a2uBtn { background: #2ecc71; color: white; }
    #debugLog { background: #333; color: #0f0; padding: 10px; font-size: 10px; height: 150px; overflow-y: scroll; margin-top: 10px; border-radius: 5px; text-align: left; }
  </style>
</head>
<body>

<div class="card">
  <h1>IIOU</h1>
  <div id="status">Status: Disconnesso</div>
  <button id="loginBtn">Login con Pi</button>
  
  <div id="paymentControls" style="display:none;">
    <button id="u2aBtn">USER TO APP</button>
    <button id="a2uBtn">APP TO USER</button>
  </div>
  
  <div id="debugLog">Log:</div>
</div>

<script>
  function log(m) { document.getElementById('debugLog').innerHTML += m + "<br>"; }
  
  Pi.init({ version: "2.0", sandbox: true });

  document.getElementById('loginBtn').onclick = async () => {
    try {
      const auth = await Pi.authenticate(["username", "payments"], (user) => {});
      window.piUser = auth.user;
      document.getElementById('status').innerText = "Loggato: " + window.piUser.username;
      document.getElementById('paymentControls').style.display = "block";
      document.getElementById('loginBtn').style.display = "none";
      log("Login effettuato.");
    } catch (e) { log("Errore Login: " + e.message); }
  };

  // U2A RIPRISTINATO COME PRIMA
  document.getElementById('u2aBtn').onclick = async () => {
    log("Inizio U2A...");
    try {
      await Pi.createPayment({
        amount: 1.0,
        memo: "Pagamento IIOU",
        metadata: { type: "u2a" }
      }, {
        onReadyForServerApproval: (pId) => {
          fetch("https://iiou.vercel.app/api/pi-payment", { 
            method: "POST", headers: {"Content-Type":"application/json"}, 
            body: JSON.stringify({ action: "approve", paymentId: pId })
          }).then(res => log("Stato Approvazione: " + res.status));
        },
        onReadyForServerCompletion: (pId, txid) => {
          fetch("https://iiou.vercel.app/api/pi-payment", { 
            method: "POST", headers: {"Content-Type":"application/json"}, 
            body: JSON.stringify({ action: "complete", paymentId: pId, txid: txid })
          }).then(res => log("Stato Completamento: " + res.status));
        },
        onCancel: (pId) => log("Pagamento annullato."),
        onError: (err, pId) => log("Errore SDK: " + err.message)
      });
    } catch (e) { log("Errore critico: " + e.message); }
  };

  // A2U CON CALLBACK COMPLETI
  document.getElementById('a2uBtn').onclick = async () => {
    log("Inizio A2U...");
    try {
      await Pi.createPayment({
        amount: 0.1,
        memo: "A2U Reward"
      }, {
        onReadyForServerApproval: (pId) => log("A2U: Approvazione richiesta..."),
        onReadyForServerCompletion: (pId, txid) => log("A2U: Completato!"),
        onCancel: (pId) => log("A2U: Annullato."),
        onError: (err, pId) => log("A2U Errore: " + err.message)
      });
    } catch (e) { log("Errore A2U: " + e.message); }
  };
</script>
</body>
</html>
