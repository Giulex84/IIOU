<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
  // Invece di chiamare init() subito, aspettiamo che la pagina sia pronta
  window.addEventListener('DOMContentLoaded', (event) => {
    try {
      Pi.init({ version: "2.0", sandbox: true });
      console.log("SDK Initialized successfully");
    } catch (e) {
      console.error("Initialization error:", e);
    }
  });

  async function login() {
    try {
      // Ora siamo sicuri che Pi.init sia stato chiamato
      const auth = await Pi.authenticate(["username", "payments", "wallet_address"], onIncompletePaymentFound);
      // ... resto del tuo codice
    } catch (err) {
      console.error(err);
      alert("Errore di login: " + err.message);
    }
  }
</script>
