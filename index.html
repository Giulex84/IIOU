<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IIOU App</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f4f4f9; }
    .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
    #debugLog { background: #333; color: #0f0; padding: 10px; font-size: 10px; height: 100px; overflow-y: scroll; margin-top: 10px; border-radius: 5px; }
  </style>
</head>
<body>
<div class="card">
  <h1>IIOU</h1>
  <button id="loginBtn">Login con Pi</button>
  <div id="paymentControls" style="display:none;">
    <button id="u2aBtn" style="background: #f1c40f;">USER TO APP</button>
  </div>
  <div id="debugLog">Log:</div>
</div>

<script>
  function log(m) { document.getElementById('debugLog').innerHTML += m + "<br>"; }
  Pi.init({ version: "2.0", sandbox: false }); // Messo false per produzione

  document.getElementById('loginBtn').onclick = async () => {
    const auth = await Pi.authenticate(["payments"], () => {});
    window.piUser = auth.user;
    document.getElementById('paymentControls').style.display = "block";
  };

  document.getElementById('u2aBtn').onclick = async () => {
    log("Inizio U2A...");
    try {
      await Pi.createPayment({ amount: 1.0, memo: "Test" }, {
        onReadyForServerApproval: async (pId) => {
          log("Approvazione richiesta: " + pId);
          const res = await fetch("/api/pi-payment", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ action: "approve", paymentId: pId })
          });
          return res;
        },
        onReadyForServerCompletion: async (pId, txid) => {
          log("Completamento...");
          await fetch("/api/pi-payment", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ action: "complete", paymentId: pId, txid })
          });
        },
        onError: (err) => log("ERRORE: " + JSON.stringify(err))
      });
    } catch (e) { log("ECCEZIONE: " + e.message); }
  };
</script>
</body>
</html>
