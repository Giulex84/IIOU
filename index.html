<script src="https://sdk.minepi.com/pi-sdk.js"></script>
<script>
  // Inizializza subito al caricamento della pagina
  Pi.init({ version: "1.5", sandbox: true });

  async function login() {
    try {
      // Ora Pi.init() è già stato chiamato
      const auth = await Pi.authenticate(["username", "payments", "wallet_address"], (payment) => {
        console.log("Pagamento interrotto trovato:", payment);
      });
      console.log("Loggato come:", auth.user.username);
      alert("Login effettuato: " + auth.user.username);
    } catch (err) {
      console.error(err);
      alert("Errore di login: " + err.message);
    }
  }
</script>
<button onclick="login()">Login con Pi</button>
